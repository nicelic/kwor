name: Release kwor

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - '.github/workflows/release.yml'
      - 'temp_frontend/**'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'kwor.service'
      - 'config/version'

jobs:
  build-linux:
    permissions:
      contents: read
    strategy:
      matrix:
        platform:
          - amd64
          - arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Validate manuals in repository root
        run: |
          test -f "User Manual.md" || { echo "Missing User Manual.md in repository root" >&2; exit 1; }
          test -f "使用手册.md" || { echo "Missing 使用手册.md in repository root" >&2; exit 1; }

      - name: Build frontend
        run: |
          cd temp_frontend
          npm install
          npm run build
          cd ..
          rm -rf web/html
          mkdir -p web/html
          cp -R temp_frontend/dist/* web/html/

      - name: Build kwor
        run: |
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=${{ matrix.platform }}
          go build -ldflags="-w -s" -o kwor main.go

          mkdir kwor-pkg
          cp kwor kwor-pkg/
          cp kwor.service kwor-pkg/
          cp install.sh kwor-pkg/ 2>/dev/null || true

      - name: Package
        run: tar -zcvf kwor-linux-${{ matrix.platform }}.tar.gz -C kwor-pkg .

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kwor-linux-${{ matrix.platform }}
          path: ./kwor-linux-${{ matrix.platform }}.tar.gz
          retention-days: 30

  publish-release:
    needs: build-linux
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Download release archives
        uses: actions/download-artifact@v5
        with:
          pattern: kwor-linux-*
          path: release-assets
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: kwor ${{ github.ref_name }}
          files: |
            release-assets/kwor-linux-amd64.tar.gz
            release-assets/kwor-linux-arm64.tar.gz
          fail_on_unmatched_files: true
          body: ""
