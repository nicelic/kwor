name: Release kwor

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - '.github/workflows/release.yml'
      - 'temp_frontend/**'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'kwor.service'
      - 'config/version'

jobs:
  build-linux:
    strategy:
      matrix:
        platform:
          - amd64
          - arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd temp_frontend
          npm install
          npm run build
          cd ..
          rm -rf web/html
          mkdir -p web/html
          cp -R temp_frontend/dist/* web/html/

      - name: Build kwor
        run: |
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=${{ matrix.platform }}
          go build -ldflags="-w -s" -o kwor main.go

          mkdir kwor-pkg
          cp kwor kwor-pkg/
          cp kwor.service kwor-pkg/
          cp install.sh kwor-pkg/ 2>/dev/null || true

      - name: Package
        run: tar -zcvf kwor-linux-${{ matrix.platform }}.tar.gz -C kwor-pkg .

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kwor-linux-${{ matrix.platform }}
          path: ./kwor-linux-${{ matrix.platform }}.tar.gz
          retention-days: 30

      - name: Upload to Release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release' && github.event.action == 'published'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file: kwor-linux-${{ matrix.platform }}.tar.gz
          asset_name: kwor-linux-${{ matrix.platform }}.tar.gz
          overwrite: true
