name: Build kwor for Windows

# Manual trigger only. Windows packaging is not part of the normal
# Linux/Docker release flow; run it on demand when a Windows build is needed.
on:
  workflow_dispatch:

jobs:
  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install zip for Windows
        shell: powershell
        run: |
          if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          choco install zip -y

      - name: Build frontend
        shell: bash
        run: |
          cd temp_frontend
          npm install
          npm run build
          cd ..
          rm -rf web/html
          mkdir -p web/html
          cp -R temp_frontend/dist/* web/html/

      - name: Build kwor
        shell: bash
        run: |
          export CGO_ENABLED=0
          export GOOS=windows
          export GOARCH=amd64
          go build -ldflags="-w -s" -o kwor.exe main.go
          mkdir kwor-windows
          cp kwor.exe kwor-windows/
          cp -r windows/* kwor-windows/

      - name: Package
        shell: bash
        run: zip -r "kwor-windows-amd64.zip" kwor-windows

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kwor-windows-amd64
          path: ./kwor-windows-amd64.zip
          retention-days: 30

  build-windows-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd temp_frontend
          npm install
          npm run build
          cd ..
          rm -rf web/html
          mkdir -p web/html
          cp -R temp_frontend/dist/* web/html/

      - name: Build kwor for ARM64
        run: |
          export CGO_ENABLED=0
          export GOOS=windows
          export GOARCH=arm64
          go build -ldflags="-w -s" -o kwor.exe main.go
          mkdir kwor-windows
          cp kwor.exe kwor-windows/
          cp -r windows/* kwor-windows/

      - name: Package ARM64
        run: zip -r "kwor-windows-arm64.zip" kwor-windows

      - name: Upload ARM64 files to Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kwor-windows-arm64
          path: ./kwor-windows-arm64.zip
          retention-days: 30
